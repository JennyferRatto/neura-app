<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURA App - Jennyfer Ratto</title>
    <style>
        body { background-color: #000; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
        
        /* PANTALLA 1: DIAMANTE */
        #screen1 { display: flex; flex-direction: column; align-items: center; text-align: center; transition: opacity 0.5s ease; }
        .diamond { width: 100px; height: 100px; background: #00e5ff; transform: rotate(45deg); box-shadow: 0 0 50px #00e5ff; animation: pulse 2s infinite; cursor: pointer; }
        .title { letter-spacing: 15px; font-size: 2.5rem; margin-top: 50px; font-weight: 300; }
        
        /* PANTALLA 2: PANEL DE CONTROL (IMAGEN 2) */
        #screen2 { display: none; width: 90%; max-width: 400px; opacity: 0; transition: opacity 0.5s ease; }
        .panel { border: 1px solid #00e5ff; padding: 20px; background: rgba(0, 229, 255, 0.05); border-radius: 10px; }
        .stat-row { display: flex; justify-content: space-between; margin: 15px 0; border-bottom: 1px solid #222; padding-bottom: 5px; }
        .btn-action { width: 100%; padding: 15px; background: #00e5ff; color: black; border: none; font-weight: bold; border-radius: 5px; margin-top: 20px; cursor: pointer; }

        @keyframes pulse { 0%, 100% { transform: rotate(45deg) scale(1); } 50% { transform: rotate(45deg) scale(1.05); box-shadow: 0 0 80px #00e5ff; } }
    </style>
</head>
<body>

    <div id="screen1">
        <div class="diamond" onclick="goToScreen2()"></div>
        <div class="title">NEURA</div>
        <p style="color: #555; letter-spacing: 2px;">BY JENNYFER RATTO</p>
    </div>

    <div id="screen2">
        <div class="panel">
            <h2 style="color: #00e5ff; text-align: center;">NEURA CORE</h2>
            <div class="stat-row"><span>STATUS:</span> <span style="color: #0f0;">ONLINE</span></div>
            <div class="stat-row"><span>ENERGÍA:</span> <span>98%</span></div>
            <div class="stat-row"><span>SISTEMA:</span> <span>DICE BUILD</span></div>
            <button class="btn-action">ACCEDER A BASE DE DATOS</button>
        </div>
    </div>

    <script>
        function goToScreen2() {
            document.getElementById('screen1').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('screen1').style.display = 'none';
                document.getElementById('screen2').style.display = 'block';
                setTimeout(() => { document.getElementById('screen2').style.opacity = '1'; }, 50);
            }, 500);
        }
    </script>
</body>
</html>
