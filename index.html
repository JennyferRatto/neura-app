<!DOCTYPE html>
<html lang="es">
<head>

    <title>NEURA - Jennyfer Ratto</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; padding: 20px; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .terminal { border: 1px solid #0f0; padding: 30px; background: #001100; box-shadow: 0 0 20px #0f0; width: 100%; max-width: 600px; }
        .line { margin: 10px 0; font-size: 1.2rem; text-transform: uppercase; }
        .ok { color: #0f0; font-weight: bold; }
        .white { color: #fff; }
        .cursor { display: inline-block; width: 10px; height: 20px; background: #0f0; animation: blink 1s infinite; vertical-align: middle; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div class="terminal">
        <div class="line"><span class="white">SISTEMA: JENNYFER@RATTO</span></div>
        <div class="line"><span class="ok">[OK]</span> <span class="white">DICE BUILD COMMAND ACTIVADO</span></div>
        <div class="line"><span class="ok">[OK]</span> <span class="white">NEURA INTERFACE ONLINE</span></div>
        <div class="line"><span class="ok">[OK]</span> <span class="white">ACCESO TOTAL 2026</span></div>
        <div class="line"><span class="white">$ </span><span class="cursor"></span></div>
    </div>
</body>
