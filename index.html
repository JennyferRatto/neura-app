


<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEURA - Jennyfer Ratto</title>
    <style>
        body { background: #000; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        /* PANTALLA 1: DIAMANTE */
        #screen1 { display: flex; flex-direction: column; align-items: center; transition: 0.5s; cursor: pointer; }
        .diamond { width: 90px; height: 90px; background: #00e5ff; transform: rotate(45deg); box-shadow: 0 0 50px #00e5ff; animation: pulse 2s infinite; }
        
        /* PANTALLA 2: ANALIZADOR */
        #screen2 { display: none; width: 85%; max-width: 400px; text-align: center; opacity: 0; transition: 0.5s; }
        .gold-card { border: 1px solid #ffd700; padding: 30px; border-radius: 20px; background: rgba(255, 215, 0, 0.02); box-shadow: 0 0 30px rgba(255, 215, 0, 0.2); }
        .btn-gold { background: linear-gradient(180deg, #ffe047 0%, #b8860b 100%); color: black; border: none; padding: 18px; width: 100%; font-weight: 900; border-radius: 12px; cursor: pointer; margin-top: 25px; box-shadow: 0 0 20px #ffd700; text-transform: uppercase; }
        
        /* PANTALLA 3: RESULTADOS (LA QUE FALTA) */
        #screen3 { display: none; width: 90%; max-width: 500px; opacity: 0; transition: 0.8s; }
        .result-header { border-left: 4px solid #00e5ff; padding-left: 15px; margin-bottom: 30px; }
        .data-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #222; font-family: monospace; font-size: 0.9rem; }
        .glow-text { color: #00e5ff; text-shadow: 0 0 10px #00e5ff; }

        /* ANIMACIONES */
        .progress-bar { width: 0%; height: 6px; background: #ffd700; box-shadow: 0 0 15px #ffd700; margin: 20px 0; border-radius: 10px; transition: 0.1s; }
        @keyframes pulse { 0%, 100% { transform: rotate(45deg) scale(1); } 50% { transform: rotate(45deg) scale(1.05); } }
    </style>
</head>
<body>

    <div id="screen1" onclick="showScreen2()">
        <div class="diamond"></div>
        <h1 style="letter-spacing: 15px; font-weight: 200; margin-top: 40px;">NEURA</h1>
    </div>

    <div id="screen2">
        <div class="gold-card">
            <h2 style="color: #ffd700; letter-spacing: 2px;">NEURA CORE</h2>
            <div style="width:100%; background:#111; height:6px; border-radius:10px;">
                <div id="bar" class="progress-bar"></div>
            </div>
            <p id="status" style="color:#ffd700; font-family:monospace;">READY</p>
            <button class="btn-gold" onclick="startLoading()">ANALIZAR</button>
        </div>
    </div>

    <div id="screen3">
        <div class="result-header">
            <h1 style="margin:0; font-weight: 200;">ANALYSIS <span class="glow-text">COMPLETE</span></h1>
            <p style="color:#555; margin:5px 0;">SYSTEM VERSION 2026.1</p>
        </div>
        
        <div class="data-row"><span>NEURA IDENT:</span> <span class="glow-text">JENNYFER_RATTO_01</span></div>
        <div class="data-row"><span>ACCURACY:</span> <span class="glow-text">99.9%</span></div>
        <div class="data-row"><span>POWER LEVEL:</span> <span class="glow-text">MAXIMUM</span></div>
        <div class="data-row"><span>STATUS:</span> <span style="color:#0f0;">ENCRYPTED</span></div>

        <button onclick="location.reload()" style="background:transparent; border:1px solid #444; color:#444; padding:10px; margin-top:40px; width:100%; border-radius:5px; cursor:pointer;">RESTART SYSTEM</button>
    </div>

    <script>
        function showScreen2() {
            document.getElementById('screen1').style.display = 'none';
            document.getElementById('screen2').style.display = 'block';
            setTimeout(() => { document.getElementById('screen2').style.opacity = '1'; }, 50);
        }

        function startLoading() {
            let bar = document.getElementById('bar');
            let status = document.getElementById('status');
            let w = 0;
            status.innerText = "PROCESSING...";
            let itv = setInterval(() => {
                if (w >= 100) {
                    clearInterval(itv);
                    status.innerText = "SUCCESS";
                    setTimeout(showScreen3, 800);
                } else {
                    w++;
                    bar.style.width = w + '%';
                }
            }, 30);
        }

        function showScreen3() {
            document.getElementById('screen2').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('screen2').style.display = 'none';
                document.getElementById('screen3').style.display = 'block';
                setTimeout(() => { document.getElementById('screen3').style.opacity = '1'; }, 50);
            }, 500);
        }
    </script>
</body>
</html>
